# Start server block for HTTP configuration
server {
    # Listen on port 80 for incoming HTTP traffic from all IPv4 addresses
    listen 80;
    
    # Listen on IPv6 port 80 if IPv6 is enabled on the system
    listen [::]:80;
    
    # Accept requests from any hostname or IP address
    server_name _;
    
    # Set maximum upload size to 10MB (increase if backend needs larger uploads)
    client_max_body_size 10M;

    # Serve static files with aggressive caching (CSS, JS, images, fonts)
    location ~* \.(jpg|jpeg|png|gif|ico|css|js|svg|woff|woff2|ttf|eot)$ {
        # Serve files from Nginx HTML directory
        root /usr/share/nginx/html;
        
        # Cache static assets for 30 days in browser
        expires 30d;
        
        # Add cache control header to allow browser/CDN caching
        add_header Cache-Control "public, immutable";
    }

    # Serve HTML files with shorter cache duration (updates appear faster)
    location ~* \.(html|json)$ {
        # Serve files from Nginx HTML directory
        root /usr/share/nginx/html;
        
        # Cache HTML for 1 hour (allows updates without re-downloading everything)
        expires 1h;
        
        # Add cache control header
        add_header Cache-Control "public";
    }

    # Proxy all API requests to the backend Flask service
    location /api/ {
        # Forward requests to backend service on port 5000 (service name: backend)
        proxy_pass http://backend:5000;
        
        # Forward original request headers to backend
        proxy_set_header Host $host;
        
        # Pass client IP to backend (important for rate limiting, logging)
        proxy_set_header X-Real-IP $remote_addr;
        
        # Pass forwarded-for header for proxy chain transparency
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        
        # Pass original protocol (http/https) to backend
        proxy_set_header X-Forwarded-Proto $scheme;
        
        # Set connection timeout to 60 seconds
        proxy_connect_timeout 60s;
        
        # Set read timeout to 60 seconds
        proxy_read_timeout 60s;
    }

    # Default location - serve index.html for SPA routing (unknown routes fallback)
    location / {
        # Serve files from Nginx HTML directory
        root /usr/share/nginx/html;
        
        # Try to serve requested file, or fallback to index.html for client-side routing
        try_files $uri $uri/ /index.html;
        
        # Don't cache index.html (so updates appear quickly)
        add_header Cache-Control "no-cache, no-store, must-revalidate";
    }
}

# Enable gzip compression for text responses (faster transfers)
gzip on;

# Compression level: 6 balances speed and compression ratio (1-9 scale)
gzip_comp_level 6;

# Only compress responses larger than 500 bytes (small responses not worth overhead)
gzip_min_length 500;

# Compress these MIME types (text-based content only)
gzip_types text/plain text/css application/json application/javascript text/javascript image/svg+xml;

# Disable compression for old browsers that don't support gzip
gzip_disable "msie6";

# Add security header to prevent MIME-type sniffing
add_header X-Content-Type-Options "nosniff" always;

# Add header to enable XSS protection in older browsers
add_header X-XSS-Protection "1; mode=block" always;

# Add header to prevent clickjacking attacks
add_header X-Frame-Options "SAMEORIGIN" always;
