# ============================================================================
# DOCKER-COMPOSE.JENKINS.YML - JENKINS CI/CD CONTAINER WITH DOCKER INTEGRATION
# ============================================================================
# IMPORTANT: This file lives in the jenkins/ subfolder of the project.
# The volume mount uses ".." (two dots) to go up one level to the project root.
# This is why the mount is:  ..:/workspace
# NOT:                         .:/workspace
# /workspace inside the container = the project root on the host
# which contains: docker-compose.yml, backend/, frontend/, Jenkinsfile
#
# This docker-compose file runs a custom Jenkins container with Docker CLI permanently
# installed. It is separate from the main docker-compose.yml to avoid port and service conflicts.
# Run with: docker compose -f jenkins/docker-compose.jenkins.yml up -d
# ============================================================================

version: '3.9'

services:
  # ========================================================================
  # JENKINS SERVICE - CI/CD automation server
  # ========================================================================
  jenkins:
    # Build from the custom Dockerfile.jenkins (not the plain jenkins/jenkins:lts image)
    # This custom image has Docker CLI and Docker Compose V2 permanently baked in
    # Context is the jenkins directory, dockerfile is in the same directory
    build:
      context: .
      dockerfile: Dockerfile.jenkins
    
    # Container name for easy identification in Docker commands
    # Makes it convenient to run: docker exec jenkins [command]
    container_name: jenkins
    
    # Automatically restart the container if it crashes or exits
    # unless-stopped: restart on crash, but don't restart if explicitly stopped by user
    # This ensures Jenkins survives system reboots and temporary Docker issues
    restart: unless-stopped
    
    # ====================================================================
    # CRITICAL: Run as root user
    # ====================================================================
    # On Windows Docker Desktop, the Docker socket is owned by root inside the Linux VM.
    # Jenkins MUST run as root to access /var/run/docker.sock with proper permissions.
    # (On Linux hosts, you would use the docker group and run as jenkins,
    #  but Windows Docker Desktop behaves differently)
    # Running as root is safe here because:
    #   1. The container is isolated from the host OS
    #   2. The socket is read-only to containers (the container cannot modify host Docker)
    #   3. This is the standard pattern for Jenkins + Docker on Docker Desktop
    user: root
    
    # ====================================================================
    # PORT MAPPINGS
    # ====================================================================
    ports:
      # Jenkins web UI: accessible at http://localhost:8080
      # port 8080 is the standard Jenkins web port (change if port conflict exists)
      - "8080:8080"
      
      # Jenkins agent protocol: port 50000
      # This port allows Jenkins agents to connect to the master for distributed builds
      # Only needed if you plan to use Jenkins agents (not required for single-node setup)
      - "50000:50000"
    
    # ====================================================================
    # VOLUME MOUNTS - Data persistence and Docker access
    # ====================================================================
    volumes:
      # Mount the jenkins_home named volume (created at bottom of compose file)
      # This volume stores ALL Jenkins data:
      #   - Job configurations
      #   - Build history and artifacts
      #   - Plugin installations
      #   - Credentials and secrets
      #   - System settings
      # Using a named volume ensures data persists across container restarts
      - jenkins_home:/var/jenkins_home
      
      # Mount the host Docker socket into the Jenkins container
      # /var/run/docker.sock is a Unix socket that controls the Docker daemon
      # By mounting it into Jenkins, the jenkins process can run docker commands
      # This socket is read-only from the container's perspective
      #   - The container CAN: run docker, docker compose, build images, start containers
      #   - The container CANNOT: modify host Docker daemon, remove host containers without permission
      # This is the key mount that fixes "docker: Permission denied" and "Cannot connect to Docker daemon" errors
      - /var/run/docker.sock:/var/run/docker.sock
      
      # Mount the entire project root into the container as /workspace
      # This file (docker-compose.jenkins.yml) lives in the jenkins/ subdirectory
      # Using ".." (two dots) goes up one level from jenkins/ to the project root
      # So /workspace inside the container = the project root on the host
      # The pipeline can then find docker-compose.yml, backend/, frontend/, Jenkinsfile, etc.
      # 
      # CORRECT mount:  ..:/workspace   (goes UP one level to project root)
      # WRONG mount:     .:/workspace   (points to jenkins/ directory)
      - ..:/workspace
    
    # ====================================================================
    # ENVIRONMENT VARIABLES - Configure Jenkins runtime behavior
    # ====================================================================
    environment:
      # Tell the Docker CLI where to find the Docker daemon socket
      # The Docker CLI (installed in Dockerfile.jenkins) uses this variable to locate the daemon
      # unix:///var/run/docker.sock is the standard Unix socket path
      # This ENV fixes "Cannot connect to Docker daemon" errors
      - DOCKER_HOST=unix:///var/run/docker.sock
      
      # Enable Docker BuildKit for faster, more reliable image builds
      # BuildKit has better caching and error reporting than the legacy builder
      # This ENV variable is matched by ENV DOCKER_BUILDKIT=1 in Dockerfile.jenkins
      - DOCKER_BUILDKIT=1
      
      # Skip the Jenkins setup wizard on first startup
      # Normally Jenkins shows a setup wizard when first started, which is interactive
      # Set to "false" if you want the wizard (for manual configuration)
      # Set to "true" (or omit) to skip and go straight to Jenkins dashboard with defaults
      # For CI/CD environments, skipping is preferred for faster automated startup
      - JAVA_OPTS=-Djenkins.install.runSetupWizard=false
    
    # ====================================================================
    # RESOURCE LIMITS - Prevent high CPU crashes and system instability
    # ====================================================================
    deploy:
      resources:
        # Hard limits: container will be killed/paused if it exceeds these
        limits:
          cpus: '2'           # Max 2 CPU cores (prevents runaway builds from consuming all host CPU)
          memory: 2G          # Max 2GB RAM (prevents memory leaks from crashing the system)
        
        # Soft reservations: Docker reserves these but allows overallocation under contention
        reservations:
          cpus: '0.5'         # Reserve 0.5 CPU cores minimum
          memory: 512M        # Reserve 512MB RAM minimum
        # These settings allow Jenkins to use more than its reservation under normal conditions,
        # but limits prevent a runaway build from consuming 100% of host resources

# ============================================================================
# NAMED VOLUMES - Persistent storage for Jenkins data
# ============================================================================
volumes:
  # Create a named volume called "jenkins_home"
  # Named volumes are managed by Docker and stored in a standard location
  # A named volume persists even after the container is deleted
  # This means: if you run "docker-compose down", the Jenkins data is NOT deleted
  # To delete Jenkins data, run: docker volume rm jenkins_home
  jenkins_home:
    driver: local